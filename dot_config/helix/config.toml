# `%APPDATA%\helix\` (on Windows)
# or
# `~/.config/helix/` (on macOS / Linux)

theme = "noctalia"
# theme = "gruvbox"
# theme = ayu-dark"

[editor]
cursorline = true
cursorcolumn = true
line-number = "relative"
auto-save = true
bufferline = "multiple"
# auto-format = false
# auto-pairs = false          
end-of-line-diagnostics = "hint"
color-modes = true
true-color = true
mouse = true
scrolloff = 10
rulers = [120]

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.lsp]
display-inlay-hints = true

[editor.statusline]
left = [ "mode", "spinner", "read-only-indicator", "file-modification-indicator", "version-control" ]
center = ["file-name", "diagnostics"]
right = ["selections", "position", "file-encoding", "file-line-ending", "file-type"]
mode = { normal = "🏄 NORMAL", insert = "👉 INSERT", select = "🔍 SELECT" }

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "⸽" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[keys.normal]
A-r = ":config-reload"
C-s = ":w"
C-r = ":reload-all"
X = "select_line_above"

# Move line up/down using Control + arrow
"A-up" = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_up",
  "paste_before"
]

"A-down" = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_down",
  "paste_before"
]

"C-up" = [
  "extend_to_line_bounds",
  "paste_before"
]

"C-down" = [
  "extend_to_line_bounds",
  "move_line_down",
  "paste_before"
]


# _ = { n = ":set whitespace.render none", a = ":set whitespace.render all" }

[keys.normal.space]
n = ":toggle line-number absolute relative"
m = ":toggle whitespace.render none all"
w = ":toggle-option soft-warp.enable"
# open current buffer in yazi
b = ":open ~/.config/niri/"
o = "file_picker_in_current_buffer_directory"
E = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]

[keys.normal.g]
# p = ":select-project"
# s = ":switcheroo"

[keys.select]
X = "select_line_above"

[keys.insert.j]
j = "normal_mode"
