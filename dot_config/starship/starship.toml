"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time\
$hostname \
$directory\
$git_branch\
$git_status\
$line_break$sudo$character"""

# $os\
# $username\
# $c\
# $cpp\
# $rust\
# $golang\
# $nodejs\
# $php\
# $java\
# $kotlin\
# $haskell\
# $python\
# [](fg:color_blue bg:color_bg3)\
# $docker_context\
# $conda\
# $pixi\  
# [](fg:color_bg3 bg:color_bg1)\
# $time\
# [ ](fg:color_bg1)\
# # [](color_orange)\
# [](bg:color_yellow fg:color_orange)\
# [](fg:color_yellow bg:color_aqua)\
# [](fg:color_aqua bg:color_blue)\
 

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[directory]
home_symbol = "⌂"
style = "fg:color_yellow"
#fg0 bg:color_yellow"
format = "[($path) [($read_only)](fg:#ff0000) >]($style)"
# read_only = ""
read_only="🔒"
# read_only_style = 'bg:color_red'
# truncation_length = 10
truncation_symbol = "••/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
# style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_aqua)]($style)'

[time]
disabled = false
time_format = "%T"
style = "bg:color_bg1"
format = '[[  $time >](fg:color_orange)]($style)'

[sudo]
format = "[$symbol ]($style)"
style = "bold color_purple"
symbol = "🗝"
disabled = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[➜](fg:color_green)"
error_symbol = "[➜](fg:color_red)"
# success_symbol = '[](bold fg:color_green)'
# error_symbol = '[](bold fg:color_red)'
# vimcmd_symbol = '[](bold fg:color_green)'
# vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
# vimcmd_replace_symbol = '[](bold fg:color_purple)'
# vimcmd_visual_symbol = '[](bold fg:color_yellow)'

[hostname]
ssh_only = true
style = "color_purple"

